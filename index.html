<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Josh's Games 🎈</title>
  <meta name="description" content="Big, friendly, no-fail little games for Josh." />
  <!-- PWA: installable to the home screen (hides the URL bar), works offline. -->
  <link rel="manifest" href="manifest.webmanifest?v=__BUILD__" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Josh" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#5ec8ff" />
  <link rel="stylesheet" href="styles/main.css?v=__BUILD__" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎈</text></svg>" />
</head>
<body>
  <header class="topbar">
    <span class="brand">Josh's Games</span>
    <button id="sound-toggle" class="btn-round" type="button"
            aria-label="Sound is off. Tap to turn sound on." aria-pressed="false">🔇</button>
  </header>

  <main id="screens">
    <!-- Home launcher: a grid of big game tiles (icons carry the meaning). -->
    <section id="screen-home" class="screen home">
      <h1 class="home__title">Pick a game! 👇</h1>
      <div id="home-grid" class="home-grid" role="list" aria-label="Games"></div>
    </section>
    <!-- Game screens are injected here by scripts/main.js from the registry. -->
  </main>

  <!-- __BUILD__ is rewritten to the commit SHA at deploy time for cache-busting. -->
  <script src="scripts/content.js?v=__BUILD__" defer></script>
  <script src="scripts/logic.js?v=__BUILD__" defer></script>
  <script src="scripts/effects.js?v=__BUILD__" defer></script>
  <script src="scripts/audio.js?v=__BUILD__" defer></script>
  <script src="scripts/art.js?v=__BUILD__" defer></script>
  <script src="scripts/stickers.js?v=__BUILD__" defer></script>
  <script src="scripts/buddy.js?v=__BUILD__" defer></script>
  <script src="scripts/framework.js?v=__BUILD__" defer></script>
  <script src="scripts/games-toys.js?v=__BUILD__" defer></script>
  <script src="scripts/games-math.js?v=__BUILD__" defer></script>
  <script src="scripts/games-logic.js?v=__BUILD__" defer></script>
  <script src="scripts/games-literacy.js?v=__BUILD__" defer></script>
  <script src="scripts/games-science.js?v=__BUILD__" defer></script>
  <script src="scripts/games-calm.js?v=__BUILD__" defer></script>
  <script src="scripts/games-fun.js?v=__BUILD__" defer></script>
  <script src="scripts/games-find.js?v=__BUILD__" defer></script>
  <script src="scripts/games-clinic.js?v=__BUILD__" defer></script>
  <script src="scripts/main.js?v=__BUILD__" defer></script>
</body>
</html>
