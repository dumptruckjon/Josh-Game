<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Josh's Games 🎈</title>
  <meta name="description" content="Big, friendly, no-fail little games for Josh." />
  <!-- PWA: installable to the home screen (hides the URL bar), works offline. -->
  <link rel="manifest" href="manifest.webmanifest?v=__BUILD__" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Josh" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#5ec8ff" />
  <link rel="stylesheet" href="styles/main.css?v=__BUILD__" />
  <link rel="stylesheet" href="styles/td.css?v=__BUILD__" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎈</text></svg>" />
</head>
<body>
  <header class="topbar">
    <span class="brand">Josh's Games</span>
    <button id="sound-toggle" class="btn-round" type="button"
            aria-label="Sound is off. Tap to turn sound on." aria-pressed="false">🔇</button>
  </header>

  <main id="screens">
    <!-- The front door: the app opens here — three big tiles, one per world.
         No name gates: each tile navigates straight to its world. -->
    <section id="screen-start" class="screen start">
      <h1 class="start__title">Who's playing? 👇</h1>
      <div class="start-grid" role="list" aria-label="Choose your world">
        <button id="start-josh" class="start-tile start-tile--josh tap" type="button" role="listitem" aria-label="Josh's games">
          <span class="start-tile__art art-fill" aria-hidden="true"></span>
          <span class="start-tile__label">Josh's Games</span>
        </button>
        <button id="start-hl" class="start-tile start-tile--hl tap" type="button" role="listitem" aria-label="华丽的游戏">
          <span class="start-tile__icon" aria-hidden="true">👵🏻</span>
          <span class="start-tile__label">华丽的游戏</span>
        </button>
        <button id="start-td" class="start-tile start-tile--td tap" type="button" role="listitem" aria-label="Fort Josh: Toybox Defense">
          <span class="start-tile__icon" aria-hidden="true">🏰</span>
          <span class="start-tile__label">Fort Josh</span>
        </button>
      </div>
    </section>
    <!-- Josh's launcher: a grid of big game tiles (icons carry the meaning). -->
    <section id="screen-home" class="screen home" hidden>
      <div class="game__bar">
        <button id="home-door" class="btn-round game__home" type="button" aria-label="Back to the front door">🚪</button>
        <h1 class="game__title home__title">Pick a game! 👇</h1>
        <span aria-hidden="true"></span>
      </div>
      <div id="home-grid" class="home-grid" role="list" aria-label="Games"></div>
    </section>
    <!-- Game screens are injected here by scripts/main.js from the registry. -->
  </main>

  <!-- __BUILD__ is rewritten to the commit SHA at deploy time for cache-busting. -->
  <script src="scripts/content.js?v=__BUILD__" defer></script>
  <script src="scripts/logic.js?v=__BUILD__" defer></script>
  <script src="scripts/effects.js?v=__BUILD__" defer></script>
  <script src="scripts/audio.js?v=__BUILD__" defer></script>
  <script src="scripts/art.js?v=__BUILD__" defer></script>
  <script src="scripts/stickers.js?v=__BUILD__" defer></script>
  <script src="scripts/buddy.js?v=__BUILD__" defer></script>
  <script src="scripts/framework.js?v=__BUILD__" defer></script>
  <script src="scripts/games-toys.js?v=__BUILD__" defer></script>
  <script src="scripts/games-math.js?v=__BUILD__" defer></script>
  <script src="scripts/games-logic.js?v=__BUILD__" defer></script>
  <script src="scripts/games-literacy.js?v=__BUILD__" defer></script>
  <script src="scripts/games-science.js?v=__BUILD__" defer></script>
  <script src="scripts/games-calm.js?v=__BUILD__" defer></script>
  <script src="scripts/games-fun.js?v=__BUILD__" defer></script>
  <script src="scripts/games-find.js?v=__BUILD__" defer></script>
  <script src="scripts/hl-content.js?v=__BUILD__" defer></script>
  <script src="scripts/games-hl-a.js?v=__BUILD__" defer></script>
  <script src="scripts/games-hl-b.js?v=__BUILD__" defer></script>
  <script src="scripts/hl-main.js?v=__BUILD__" defer></script>
  <script src="scripts/td-data.js?v=__BUILD__" defer></script>
  <script src="scripts/td-logic.js?v=__BUILD__" defer></script>
  <script src="scripts/td-render.js?v=__BUILD__" defer></script>
  <script src="scripts/td-ui.js?v=__BUILD__" defer></script>
  <script src="scripts/td-main.js?v=__BUILD__" defer></script>
  <script src="scripts/main.js?v=__BUILD__" defer></script>
</body>
</html>
